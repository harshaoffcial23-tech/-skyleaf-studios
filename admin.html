<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyLeaf Studios — Merchant Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAFA;
      --white: #FFFFFF;
      --blue: #0066CC;
      --green: #28A745;
      --text: #0F172A;
      --text-muted: #475569;
      --border: rgba(0, 102, 204, 0.1);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }
    a { color: var(--blue); text-decoration: none; }
    
    /* ── LOGIN PANEL ── */
    #login-wrap {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 40px rgba(15,23,42,0.08);
      text-align: center;
    }
    .login-logo {
      font-family: var(--serif);
      font-size: 32px; letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .login-logo span { color: var(--green); font-style: italic; }
    .login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; text-transform: uppercase; letter-spacing: 0.25em; }
    .login-input {
      width: 100%; padding: 14px;
      border: 1px solid rgba(15,23,42,0.15);
      border-radius: 8px;
      margin-bottom: 20px;
      font-family: var(--sans);
      font-size: 15px;
      text-align: center;
    }
    .login-btn {
      width: 100%; padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-btn:hover { background: #0052cc; }
    .login-err { color: #d32f2f; font-size: 13px; margin-top: 12px; display: none; }

    /* ── MAIN LAYOUT ── */
    #admin-app { display: none; }
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
    }
    .header-logo {
      font-family: var(--serif);
      font-size: 24px; font-weight: 300; letter-spacing: 0.12em;
    }
    .header-logo span { color: var(--green); font-style: italic; }
    .logout-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
    }
    .logout-btn:hover { border-color: var(--blue); color: var(--blue); }

    .main-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 32px;
    }

    /* ── SIDE NAV ── */
    .sidebar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      height: fit-content;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
    }
    .side-nav-btn {
      width: 100%; padding: 14px 16px;
      border: none;
      background: transparent;
      border-radius: 8px;
      text-align: left;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
      transition: background 0.3s, color 0.3s;
    }
    .side-nav-btn.active {
      background: var(--blue-glow);
      color: var(--blue);
    }
    .side-nav-btn:hover:not(.active) {
      background: rgba(15,23,42,0.03);
      color: var(--text);
    }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }
    .panel-header {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-family: var(--serif); font-size: 28px; font-weight: 300; }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 4px 15px rgba(15,23,42,0.02);
      margin-bottom: 24px;
    }

    /* Form Fields */
    .form-group { margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    label {
      display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted);
      margin-bottom: 6px; font-weight: 600;
    }
    input, select, textarea {
      width: 100%; padding: 12px;
      border: 1px solid rgba(15,23,42,0.15);
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 14px;
      background: #FFF;
      color: var(--text);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    .btn-submit {
      padding: 12px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--sans);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-submit:hover { background: #0052cc; }

    /* Leads Table */
    table {
      width: 100%; border-collapse: collapse;
      margin-top: 16px;
      font-size: 14px;
      background: var(--white);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg2); font-weight: 600; font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    
    .delete-btn {
      background: transparent; border: 1px solid rgba(211, 47, 47, 0.3);
      color: #d32f2f; padding: 6px 12px; border-radius: 4px;
      cursor: pointer; transition: background 0.3s, color 0.3s;
      font-size: 12px;
    }
    .delete-btn:hover { background: rgba(211, 47, 47, 0.08); border-color: #d32f2f; }
    
    .btn-add {
      padding: 10px 18px;
      background: var(--green);
      color: #fff; border: none; border-radius: 6px;
      font-weight: 600; font-size: 13px; cursor: pointer;
      transition: background 0.3s;
    }
    .btn-add:hover { background: #218838; }

    /* Stories Grid in Admin */
    .admin-stories-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .admin-story-card {
      display: flex; gap: 16px; align-items: center;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px;
    }
    .admin-story-img {
      width: 60px; height: 80px; object-fit: cover;
      background: #E2E8F0; border-radius: 4px;
    }
    .admin-story-details { flex-grow: 1; }
    .admin-story-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .admin-story-meta { font-size: 12px; color: var(--text-muted); }

  </style>
</head>
<body>

  <!-- ── LOGIN PANEL ── -->
  <div id="login-wrap">
    <div class="login-card">
      <div class="login-logo">Sky<span>Leaf</span> Studios</div>
      <div class="login-subtitle">Control Dashboard</div>
      <input type="password" id="passkey" class="login-input" placeholder="Enter Admin Passkey" autofocus>
      <button class="login-btn" onclick="tryLogin()">Unlock Portal</button>
      <div id="login-error" class="login-err">Invalid passcode. Please try again.</div>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 32px;">Default passkey is <strong>admin</strong></div>
    </div>
  </div>

  <!-- ── ADMIN APPLICATION ── -->
  <div id="admin-app">
    <header role="banner">
      <div class="header-logo">Sky<span>Leaf</span> Studios</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="main-container">
      <!-- Sidebar Nav -->
      <aside class="sidebar">
        <button class="side-nav-btn active" onclick="switchTab('manage', this)">
          🎬 Manage Content
        </button>
        <button class="side-nav-btn" onclick="switchTab('featured', this)">
          ⭐ Featured Banner
        </button>
        <button class="side-nav-btn" onclick="switchTab('leads', this)">
          📨 Leads Dashboard
        </button>
        <a href="skyleaf-studios.html" target="_blank" class="side-nav-btn" style="text-align: center; justify-content: center; background: rgba(0, 102, 204, 0.05); border: 1px dashed var(--blue); color: var(--blue);">
          🌐 View Website
        </a>
      </aside>

      <!-- Panel Area -->
      <main class="content-area">
        
        <!-- Tab 1: Manage Content -->
        <div id="panel-manage" class="panel active">
          <div class="panel-header">
            <h1 class="panel-title">Manage Movie Stories</h1>
            <button class="btn-add" onclick="showAddForm()">+ Add New Story</button>
          </div>

          <!-- Add/Edit Story Form (Toggleable) -->
          <div class="card" id="story-form-card" style="display: none;">
            <h3 style="font-family: var(--serif); font-size: 20px; margin-bottom: 20px;" id="form-action-title">Add New Story</h3>
            <form id="story-form" onsubmit="saveStory(event)">
              <input type="hidden" id="edit-story-id">
              <div class="form-row">
                <div class="form-group">
                  <label>Story Title</label>
                  <input type="text" id="story-title" required placeholder="e.g., Summer Vows">
                </div>
                <div class="form-group">
                  <label>Category</label>
                  <select id="story-category">
                    <option value="Wedding Film">Wedding Film</option>
                    <option value="Pre-Wedding Film">Pre-Wedding Film</option>
                    <option value="Baby Diary">Baby Diary</option>
                    <option value="Family Story">Family Story</option>
                    <option value="Creative Production">Creative Production</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Location</label>
                  <input type="text" id="story-location" required placeholder="e.g., Nellore">
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input type="text" id="story-year" required placeholder="e.g., 2024">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Cover Image Source</label>
                  <select id="story-image">
                    <option value="IMG_5708.PNG">DUPATTA SUNSET (IMG_5708.PNG)</option>
                    <option value="IMG_5709.PNG">WALKING SUNSET (IMG_5709.PNG)</option>
                    <option value="IMG_5711.PNG">SIDE PROFILE SUNSET (IMG_5711.PNG)</option>
                    <option value="IMG_6060.JPG.jpeg">PORTRAIT BLUE (IMG_6060.JPG.jpeg)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>YouTube Embed Link</label>
                  <input type="text" id="story-video" required placeholder="e.g., https://www.youtube.com/embed/5K18w6Jc0z4">
                </div>
              </div>
              <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-submit">Save Story</button>
                <button type="button" class="logout-btn" onclick="hideAddForm()">Cancel</button>
              </div>
            </form>
          </div>

          <div class="admin-stories-grid" id="admin-stories-grid">
            <!-- Dynamic Stories List -->
          </div>
        </div>

        <!-- Tab 2: Featured Banner -->
        <div id="panel-featured" class="panel">
          <div class="panel-header">
            <h1 class="panel-title">Featured Story Of The Month</h1>
          </div>
          <div class="card">
            <form id="featured-form" onsubmit="saveFeatured(event)">
              <div class="form-row">
                <div class="form-group">
                  <label>Main Title</label>
                  <input type="text" id="feat-title" required>
                </div>
                <div class="form-group">
                  <label>Emphasized Accent Word</label>
                  <input type="text" id="feat-em" required placeholder="e.g. Love">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Location</label>
                  <input type="text" id="feat-location" required>
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <input type="text" id="feat-year" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Background Image</label>
                  <select id="feat-image">
                    <option value="IMG_5708.PNG">DUPATTA SUNSET (IMG_5708.PNG)</option>
                    <option value="IMG_5709.PNG">WALKING SUNSET (IMG_5709.PNG)</option>
                    <option value="IMG_5711.PNG">SIDE PROFILE SUNSET (IMG_5711.PNG)</option>
                    <option value="IMG_6060.JPG.jpeg">PORTRAIT BLUE (IMG_6060.JPG.jpeg)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>YouTube Trailer Embed Link</label>
                  <input type="text" id="feat-video" required>
                </div>
              </div>
              <div class="form-group">
                <label>Story Summary Description</label>
                <textarea id="feat-desc" rows="4" required></textarea>
              </div>
              <button type="submit" class="btn-submit">Save Banner Updates</button>
            </form>
          </div>
        </div>

        <!-- Tab 3: Leads Dashboard -->
        <div id="panel-leads" class="panel">
          <div class="panel-header">
            <h1 class="panel-title">Client Inquiry Leads</h1>
            <button class="delete-btn" onclick="clearLeads()" style="border-color: #d32f2f;">Clear All Leads</button>
          </div>
          <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="leads-table">
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Contact</th>
                  <th>Event Type</th>
                  <th>Event Date</th>
                  <th>Location</th>
                  <th>Submitted At</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="leads-tbody">
                <!-- Dynamic leads rows -->
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script>
    // Login Verification
    const passkeyField = document.getElementById('passkey');
    passkeyField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') tryLogin();
    });

    function tryLogin() {
      const pass = passkeyField.value.trim();
      if (pass.toLowerCase() === 'admin' || pass.toLowerCase() === 'skyleaf') {
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        initDashboard();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function logout() {
      passkeyField.value = '';
      document.getElementById('login-wrap').style.display = 'flex';
      document.getElementById('admin-app').style.display = 'none';
    }

    // Switch Tabs
    function switchTab(tabName, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.side-nav-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(`panel-${tabName}`).classList.add('active');
      if (btn) btn.classList.add('active');
      
      if (tabName === 'manage') loadStoriesGrid();
      if (tabName === 'featured') loadFeaturedForm();
      if (tabName === 'leads') loadLeadsTable();
    }

    // Initialize Dashboard data
    function initDashboard() {
      loadStoriesGrid();
    }

    // Load Tab 1 Stories
    function loadStoriesGrid() {
      const stories = JSON.parse(localStorage.getItem('skyleaf_stories')) || [];
      const grid = document.getElementById('admin-stories-grid');
      grid.innerHTML = '';
      
      stories.forEach(story => {
        const card = document.createElement('div');
        card.className = 'admin-story-card';
        card.innerHTML = `
          <img class="admin-story-img" src="${story.image || 'IMG_5711.PNG'}" alt="">
          <div class="admin-story-details">
            <div class="admin-story-title">${story.title}</div>
            <div class="admin-story-meta">${story.category} &middot; ${story.location} &middot; ${story.year}</div>
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="logout-btn" onclick="editStory(${story.id})" style="border-color: var(--blue); color: var(--blue);">Edit</button>
            <button class="delete-btn" onclick="deleteStory(${story.id})">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Forms Handlers
    function showAddForm() {
      document.getElementById('form-action-title').textContent = 'Add New Story';
      document.getElementById('edit-story-id').value = '';
      document.getElementById('story-form').reset();
      document.getElementById('story-form-card').style.display = 'block';
    }
    
    function hideAddForm() {
      document.getElementById('story-form-card').style.display = 'none';
    }

    function saveStory(e) {
      e.preventDefault();
      const stories = JSON.parse(localStorage.getItem('skyleaf_stories')) || [];
      const editId = document.getElementById('edit-story-id').value;
      
      const story = {
        title: document.getElementById('story-title').value,
        category: document.getElementById('story-category').value,
        location: document.getElementById('story-location').value,
        year: document.getElementById('story-year').value,
        image: document.getElementById('story-image').value,
        video: document.getElementById('story-video').value
      };
      
      if (editId) {
        // Edit existing
        const idx = stories.findIndex(s => s.id == editId);
        if (idx !== -1) {
          story.id = parseInt(editId);
          stories[idx] = story;
        }
      } else {
        // Create new
        story.id = Date.now();
        stories.push(story);
      }
      
      localStorage.setItem('skyleaf_stories', JSON.stringify(stories));
      hideAddForm();
      loadStoriesGrid();
    }

    function editStory(id) {
      const stories = JSON.parse(localStorage.getItem('skyleaf_stories')) || [];
      const story = stories.find(s => s.id == id);
      if (!story) return;
      
      document.getElementById('form-action-title').textContent = 'Edit Movie Story';
      document.getElementById('edit-story-id').value = story.id;
      document.getElementById('story-title').value = story.title;
      document.getElementById('story-category').value = story.category;
      document.getElementById('story-location').value = story.location;
      document.getElementById('story-year').value = story.year;
      document.getElementById('story-image').value = story.image;
      document.getElementById('story-video').value = story.video;
      
      document.getElementById('story-form-card').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteStory(id) {
      if (!confirm('Are you sure you want to delete this story?')) return;
      let stories = JSON.parse(localStorage.getItem('skyleaf_stories')) || [];
      stories = stories.filter(s => s.id != id);
      localStorage.setItem('skyleaf_stories', JSON.stringify(stories));
      loadStoriesGrid();
    }

    // Tab 2: Featured Form
    function loadFeaturedForm() {
      const featured = JSON.parse(localStorage.getItem('skyleaf_featured'));
      if (!featured) return;
      
      document.getElementById('feat-title').value = featured.title;
      document.getElementById('feat-em').value = featured.emTitle || '';
      document.getElementById('feat-location').value = featured.location;
      document.getElementById('feat-year').value = featured.year;
      document.getElementById('feat-image').value = featured.image;
      document.getElementById('feat-video').value = featured.video;
      document.getElementById('feat-desc').value = featured.description;
    }

    function saveFeatured(e) {
      e.preventDefault();
      const featured = {
        title: document.getElementById('feat-title').value,
        emTitle: document.getElementById('feat-em').value,
        location: document.getElementById('feat-location').value,
        year: document.getElementById('feat-year').value,
        image: document.getElementById('feat-image').value,
        video: document.getElementById('feat-video').value,
        description: document.getElementById('feat-desc').value
      };
      localStorage.setItem('skyleaf_featured', JSON.stringify(featured));
      alert('Featured Story Banner updated successfully!');
    }

    // Tab 3: Leads Table
    function loadLeadsTable() {
      const leads = JSON.parse(localStorage.getItem('skyleaf_leads')) || [];
      const tbody = document.getElementById('leads-tbody');
      tbody.innerHTML = '';
      
      if (leads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">No client inquiries received yet.</td></tr>';
        return;
      }
      
      leads.forEach(lead => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            <strong>${lead.name}</strong>
          </td>
          <td>
            <div>📞 <a href="tel:${lead.phone}">${lead.phone}</a></div>
            <div style="font-size:12px; margin-top:2px;">✉️ <a href="mailto:${lead.email}">${lead.email}</a></div>
          </td>
          <td><span style="background:var(--blue-glow); color:var(--blue); padding:4px 8px; border-radius:4px; font-size:11px; font-weight:600;">${lead.event}</span></td>
          <td>${lead.date}</td>
          <td>${lead.location}</td>
          <td style="font-size:12px; color:var(--text-muted);">${lead.timestamp}</td>
          <td>
            <button class="delete-btn" onclick="deleteLead(${lead.id})">Delete</button>
          </td>
        `;
        
        // Let's add details row if they wrote a message
        if (lead.message) {
          const detailRow = document.createElement('tr');
          detailRow.innerHTML = `
            <td colspan="7" style="background:#F8FAFC; font-size:13px; color:var(--text-muted); border-top:none; padding:8px 16px 16px;">
              <strong>Message:</strong> "${lead.message}"
            </td>
          `;
          tbody.appendChild(row);
          tbody.appendChild(detailRow);
        } else {
          tbody.appendChild(row);
        }
      });
    }

    function deleteLead(id) {
      if (!confirm('Are you sure you want to delete this inquiry?')) return;
      let leads = JSON.parse(localStorage.getItem('skyleaf_leads')) || [];
      leads = leads.filter(l => l.id != id);
      localStorage.setItem('skyleaf_leads', JSON.stringify(leads));
      loadLeadsTable();
    }

    function clearLeads() {
      if (!confirm('Are you absolutely sure you want to clear ALL inquiries? This cannot be undone.')) return;
      localStorage.setItem('skyleaf_leads', JSON.stringify([]));
      loadLeadsTable();
    }
  </script>
</body>
</html>
